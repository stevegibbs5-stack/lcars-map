<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LCARS AIR COMMAND</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* LCARS LEFT PANEL */
#left {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  width: 240px;
  background: #1a1a1a;
  padding: 15px;
  color: #ffcc66;
}

/* TOP BAR */
#top {
  position: absolute;
  top: 0;
  left: 240px;
  right: 0;
  height: 50px;
  background: #ff9900;
  display: flex;
  align-items: center;
  padding-left: 20px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* MAP */
#map {
  position: absolute;
  top: 50px;
  left: 240px;
  right: 0;
  bottom: 0;
}

/* BUTTONS */
.button {
  background: #aa55ff;
  padding: 10px;
  margin: 10px 0;
  border-radius: 20px;
  text-align: center;
  cursor: pointer;
  color: black;
  font-weight: bold;
}

/* SLIDERS */
input {
  width: 100%;
}

/* STATUS */
#status {
  margin-top: 15px;
  font-size: 14px;
}

/* MARKER */
.plane {
  font-size: 14px;
  color: #00ffff;
}
</style>
</head>

<body>

<div id="left">
  <div class="button" onclick="toggle()">TOGGLE</div>

  <label>Altitude</label>
  <input type="range" id="alt" min="0" max="40000" value="40000">

  <label>Speed</label>
  <input type="range" id="spd" min="0" max="600" value="600">

  <div id="status">INITIALISING</div>
</div>

<div id="top">LCARS AIR COMMAND</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let planes = {};
let running = true;
let simulationMode = false;

/* STATUS */
function status(text) {
  document.getElementById("status").innerText = "STATUS: " + text;
}

/* TOGGLE */
function toggle() {
  running = !running;
  status(running ? "ACTIVE" : "PAUSED");
}

/* CREATE ICON */
function createIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="plane">✈</div>',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });
}

/* LOAD DATA */
async function loadData() {
  if (!running) return;

  try {
    const res = await fetch("/api/air");
    const data = await res.json();

    if (!data.data) throw "no data";

    simulationMode = false;
    status("LIVE DATA");

    const altLimit = document.getElementById("alt").value;
    const spdLimit = document.getElementById("spd").value;

    data.data.forEach(f => {

      if (!f.live || !f.live.latitude) return;

      const lat = f.live.latitude;
      const lon = f.live.longitude;
      const alt = f.live.altitude || 0;
      const spd = f.live.speed || 0;

      if (alt > altLimit || spd > spdLimit) return;

      const id = f.flight ? f.flight.iata : Math.random();

      if (!planes[id]) {
        planes[id] = {
          lat, lon,
          marker: L.marker([lat, lon], {
            icon: createIcon()
          }).addTo(map)
        };
      } else {
        planes[id].lat += (lat - planes[id].lat) * 0.2;
        planes[id].lon += (lon - planes[id].lon) * 0.2;

        planes[id].marker.setLatLng([planes[id].lat, planes[id].lon]);
      }
    });

  } catch (e) {
    simulationMode = true;
    status("SIMULATION");
  }
}

/* SIMULATION */
function simulate() {
  if (!simulationMode || !running) return;

  for (let i = 0; i < 15; i++) {

    if (!planes[i]) {
      planes[i] = {
        lat: Math.random() * 140 - 70,
        lon: Math.random() * 360 - 180,
        marker: L.marker([0, 0], {
          icon: createIcon()
        }).addTo(map)
      };
    }

    planes[i].lat += (Math.random() - 0.5) * 0.3;
    planes[i].lon += (Math.random() - 0.5) * 0.3;

    planes[i].marker.setLatLng([planes[i].lat, planes[i].lon]);
  }
}

/* LOOP */
setInterval(() => {
  loadData();
  simulate();
}, 3000);

status("STARTING");
</script>

</body>
</html>
