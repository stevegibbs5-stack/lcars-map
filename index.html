<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LCARS Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: #ffcc66;
}

#top {
    height: 60px;
    background: #ff9900;
    display: flex;
    align-items: center;
    padding-left: 20px;
    font-weight: bold;
}

#map {
    position: absolute;
    top: 60px;
    bottom: 0;
    left: 0;
    right: 0;
}
</style>
</head>

<body>

<div id="top">LCARS MAP</div>
<div id="map"></div>

<script>
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
}).addTo(map);

/* Simple markers (no API needed) */
const points = [
    [51.5, -0.1],
    [40.7, -74.0],
    [35.7, 139.7],
    [-33.8, 151.2]
];

points.forEach(p => {
    L.circleMarker(p, {
        radius: 5,
        color: '#00ffff'
    }).addTo(map);
});
</script>

</body>
</html>
